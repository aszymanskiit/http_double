name: Docs

on:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15.7"
          otp-version: "26.2"

      - name: Install dependencies
        run: mix deps.get

      - name: Build docs
        run: mix docs

