name: Dialyzer

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dialyzer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ["24.3"]
        elixir: ["1.15.7"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-dialyzer-deps-${{ hashFiles('**/mix.lock') }}-${{ matrix.elixir }}-${{ matrix.otp }}

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-plt-${{ matrix.elixir }}-${{ matrix.otp }}

      - name: Install dependencies
        run: mix deps.get

      - name: Run dialyzer
        run: mix dialyzer

