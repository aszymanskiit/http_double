name: Publish Hex

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15.7"
          otp-version: "26.2"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile project
        run: mix compile

      - name: Verify tag matches mix.exs version
        run: |
          MIX_VERSION=$(mix run --no-start --no-compile -e 'IO.puts(Mix.Project.config()[:version])' | tr -d '\r' | tail -n 1)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MIX_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match mix.exs version ${MIX_VERSION}" >&2
            exit 1
          fi
          echo "Publishing http_double ${MIX_VERSION} for tag ${GITHUB_REF_NAME}"

      - name: Run tests
        run: mix test

      - name: Publish package to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Publish docs to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish docs --yes
